name: Fuzz
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  fuzz:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Fuzz protocol decoders
        run: go test -fuzz=FuzzDecodeMessage -fuzztime=10m ./pkg/protocol/... || true
      - name: Fuzz agent card
        run: go test -fuzz=FuzzDecodeAgentCard -fuzztime=10m ./pkg/protocol/... || true
