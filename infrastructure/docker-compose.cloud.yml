# msg2agent Cloud / SaaS Stack
#
# Multi-tenant deployment with API key auth, billing metering, and TLS termination.
# Intended for a hosted offering (Cloud Starter / Team / Enterprise plans).
#
# Required environment variables (set in .env or your secret manager):
#   DOMAIN           - public hostname, e.g. relay.msg2agent.io
#   RELAY_IMAGE      - docker image for the relay
#   MCP_IMAGE        - docker image for the mcp-server
#
# Usage:
#   docker compose -f infrastructure/docker-compose.cloud.yml up -d

services:

  relay:
    image: ${RELAY_IMAGE:-msg2agent-relay:latest}
    container_name: cloud-relay
    ports:
      - "8080:8080"
    environment:
      MSG2AGENT_RELAY_ADDR: ":8080"
      MSG2AGENT_STORE: "sqlite"
      MSG2AGENT_STORE_FILE: "/data/relay.db"
      MSG2AGENT_LOG_LEVEL: "info"
      MSG2AGENT_MAX_CONNECTIONS: "10000"
      MSG2AGENT_MSG_RATE: "1000"
      MSG2AGENT_REQUIRE_DID_PROOF: "true"
    volumes:
      - relay-data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cloud
    restart: unless-stopped

  mcp:
    image: ${MCP_IMAGE:-msg2agent-mcp-server:latest}
    container_name: cloud-mcp
    # Not exposed directly; nginx terminates TLS and proxies to :3001
    expose:
      - "3001"
    command: [
      "-name", "cloud-gateway",
      "-domain", "${DOMAIN:-relay.msg2agent.io}",
      "-relay", "ws://relay:8080",
      "-transport", "streamable-http",
      "-addr", ":3001",
      "-billing-db", "/data/billing.db"
    ]
    volumes:
      - billing-data:/data
    depends_on:
      relay:
        condition: service_healthy
    networks:
      - cloud
    restart: unless-stopped

  dashboard:
    image: msg2agent/dashboard:latest
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - MSG2AGENT_DASHBOARD_ADDR=:8082
      - MSG2AGENT_RELAY_URL=http://relay:8080
      - MSG2AGENT_BILLING_DB=/data/billing.db
      - MSG2AGENT_BILLING_DRIVER=sqlite
      - MSG2AGENT_OAUTH2_ISSUER_URL=${MSG2AGENT_OAUTH2_ISSUER_URL}
      - MSG2AGENT_OAUTH2_AUDIENCE=${MSG2AGENT_OAUTH2_AUDIENCE}
      - MSG2AGENT_OAUTH_AUTO_PROVISION=free
    volumes:
      - billing-data:/data
    depends_on:
      - relay
    networks:
      - cloud

  nginx:
    image: nginx:1.27-alpine
    container_name: cloud-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/cloud.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - mcp
    networks:
      - cloud
    restart: unless-stopped

volumes:
  relay-data:
  billing-data:

networks:
  cloud:
    driver: bridge
