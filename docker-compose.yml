# msg2agent Docker Compose - Base Configuration
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f            # Follow logs
#   docker compose down               # Stop and remove
#
# Overrides:
#   docker compose -f docker-compose.yml -f docker-compose.sqlite.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

services:
  # Relay Hub - Central message router
  relay:
    image: msg2agent-relay:latest
    build:
      context: .
      target: relay
    ports:
      - "${RELAY_PORT:-8080}:8080"
    environment:
      MSG2AGENT_RELAY_ADDR: ":8080"
      MSG2AGENT_STORE: "memory"
      MSG2AGENT_LOG_LEVEL: "${LOG_LEVEL:-debug}"
      MSG2AGENT_MAX_CONNECTIONS: "${MAX_CONNECTIONS:-1000}"
      MSG2AGENT_MSG_RATE: "${MSG_RATE:-100}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - msg2agent
    restart: unless-stopped

  # Agent Alice
  alice:
    image: msg2agent-agent:latest
    build:
      context: .
      target: agent
    ports:
      - "${ALICE_HTTP_PORT:-8081}:8081"
      - "${ALICE_P2P_PORT:-8082}:8082"
      - "${ALICE_METRICS_PORT:-9091}:9090"
    environment:
      MSG2AGENT_NAME: "alice"
      MSG2AGENT_DOMAIN: "alice.local"
      MSG2AGENT_RELAY: "ws://relay:8080"
      MSG2AGENT_HTTP: ":8081"
      MSG2AGENT_LISTEN: ":8082"
      MSG2AGENT_METRICS: ":9090"
      MSG2AGENT_LOG_LEVEL: "${LOG_LEVEL:-debug}"
    depends_on:
      relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - msg2agent
    restart: unless-stopped

  # Agent Bob
  bob:
    image: msg2agent-agent:latest
    build:
      context: .
      target: agent
    ports:
      - "${BOB_HTTP_PORT:-8083}:8081"
      - "${BOB_P2P_PORT:-8084}:8082"
      - "${BOB_METRICS_PORT:-9092}:9090"
    environment:
      MSG2AGENT_NAME: "bob"
      MSG2AGENT_DOMAIN: "bob.local"
      MSG2AGENT_RELAY: "ws://relay:8080"
      MSG2AGENT_HTTP: ":8081"
      MSG2AGENT_LISTEN: ":8082"
      MSG2AGENT_METRICS: ":9090"
      MSG2AGENT_LOG_LEVEL: "${LOG_LEVEL:-debug}"
    depends_on:
      relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - msg2agent
    restart: unless-stopped

  # MCP Server - Model Context Protocol interface for AI assistants
  mcp-server:
    image: msg2agent-mcp-server:latest
    build:
      context: .
      target: mcp-server
    command: ["-name", "mcp-agent", "-domain", "mcp.local", "-relay", "ws://relay:8080"]
    stdin_open: true
    tty: true
    volumes:
      - mcp-identity:/home/msg2agent/.msg2agent
    depends_on:
      relay:
        condition: service_healthy
    networks:
      - msg2agent

volumes:
  mcp-identity:

networks:
  msg2agent:
    driver: bridge
