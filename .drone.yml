      - TAG=${DRONE_TAG} docker compose -f /opt/services/msg2agent/docker-compose.yml up -d --no-build

volumes:
  - name: docker_sock
    host:
      path: /var/run/docker.sock
  - name: opt_services
    host:
      path: /opt/services

trigger:
