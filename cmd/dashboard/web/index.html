<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>msg2agent Dashboard</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <nav>
    <a href="/" class="logo">msg2agent</a>
    <span id="nav-plan"></span>
    <button id="btn-signout" hidden style="margin-left:auto;">Sign Out</button>
  </nav>

  <div id="auth-gate" hidden>
    <div style="max-width:480px;margin:5rem auto;padding:0 1rem;text-align:center;">
      <h2 style="font-size:1.4rem;margin-bottom:1rem;color:var(--text);text-transform:none;letter-spacing:0;">Sign in</h2>
      <p style="color:var(--muted);margin-bottom:2rem;font-size:0.95rem;">
        Authenticate with Google to access your msg2agent dashboard.
      </p>
      <button id="btn-signin" class="btn-primary">Sign in with Google</button>
      <p id="auth-error" hidden style="color:#dc2626;margin-top:1.5rem;font-size:0.9rem;"></p>
    </div>
  </div>

  <main id="main-content">
    <section id="section-account">
      <h2>Account</h2>
      <div id="account-info">
        <div class="skeleton" style="height:1rem;width:60%;margin-bottom:0.5rem;"></div>
        <div class="skeleton" style="height:1rem;width:40%;"></div>
      </div>
    </section>
    <section id="section-keys">
      <h2>API Keys</h2>
      <button id="btn-create-key">Create Key</button>
      <div id="keys-list">
        <div class="skeleton" style="height:2.5rem;margin-top:1rem;"></div>
      </div>
    </section>
    <section id="section-usage">
      <h2>Usage</h2>
      <div id="usage-chart">
        <div class="skeleton" style="height:2.5rem;margin-bottom:0.5rem;"></div>
        <div class="skeleton" style="height:2.5rem;"></div>
      </div>
    </section>
    <section id="section-billing">
      <h2>Billing</h2>
      <button id="btn-upgrade-starter">Upgrade to Starter</button>
      <button id="btn-upgrade-team">Upgrade to Team</button>
      <button id="btn-portal">Manage Subscription</button>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
