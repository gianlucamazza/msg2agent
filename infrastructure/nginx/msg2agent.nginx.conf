# ------------------------------------------------------------
# msg2agent.home.gianlucamazza.it
# WebSocket relay hub (msg2agent)
# ------------------------------------------------------------

map $scheme $hsts_header {
    https   "max-age=63072000;includeSubDomains; preload";
}

server {
  set $forward_scheme http;
  set $server         "192.168.1.103";
  set $port           8080;

  listen 80;
  listen [::]:80;
  listen 443 ssl;
  listen [::]:443 ssl;

  server_name msg2agent.home.gianlucamazza.it;

  http2 on;

  # Let's Encrypt wildcard SSL (*.home.gianlucamazza.it)
  include conf.d/include/letsencrypt-acme-challenge.conf;
  include conf.d/include/ssl-cache.conf;
  include conf.d/include/ssl-ciphers.conf;
  ssl_certificate /etc/letsencrypt/live/npm-6/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/npm-6/privkey.pem;

  # Block Exploits
  include conf.d/include/block-exploits.conf;

  # HSTS
  add_header Strict-Transport-Security $hsts_header always;

  # Force SSL
  include conf.d/include/force-ssl.conf;

  # WebSocket upgrade headers (required for relay)
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $http_connection;
  proxy_http_version 1.1;

  access_log /data/logs/proxy-host-msg2agent_access.log proxy;
  error_log  /data/logs/proxy-host-msg2agent_error.log warn;

  location / {
    add_header Strict-Transport-Security $hsts_header always;

    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_http_version 1.1;

    # Timeout generosi per connessioni WebSocket long-lived
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 10s;

    include conf.d/include/proxy.conf;
  }

  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}
