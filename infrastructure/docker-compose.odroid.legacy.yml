# LEGACY — solo relay, dismisso 2026-05-06
# Sostituito da infrastructure/docker-compose.odroid.yml
# che aggiunge mcp-server + dashboard + registry images corrette.
#
# Conservato per riferimento / rollback di emergenza.

# msg2agent Production Stack
# Agent: did:wba:msg2agent.home.gianlucamazza.it:agent:openclaw
# Relay:  wss://msg2agent.home.gianlucamazza.it (via NPM)
# MCP:    http://localhost:3010/mcp (OpenClaw plugin endpoint)
#
# Security:
#   - MSG2AGENT_ALLOWED_DIDS: allowlist DID (vuoto = open relay)
#   - DID proof verification abilitata (default)
#   - Rate limiting: 20 msg/sec, max 100 connessioni
#   - Porta relay solo su LAN (192.168.1.103), NPM fa TLS termination

services:

  # ── Relay Hub ──────────────────────────────────────────────────────────────
  relay:
    image: msg2agent-relay:latest
    container_name: msg2agent-relay
    ports:
      - "192.168.1.103:8080:8080"   # LAN only — NPM fa proxy pubblico
    environment:
      MSG2AGENT_RELAY_ADDR:      ":8080"
      MSG2AGENT_STORE:           "sqlite"
      MSG2AGENT_STORE_FILE:      "/data/relay.db"
      MSG2AGENT_LOG_LEVEL:       "debug"
      # Limiti conservativi per uso personale
      MSG2AGENT_MAX_CONNECTIONS: "100"
      MSG2AGENT_MSG_RATE:        "20"
      # Sicurezza: DID allowlist (solo il nostro agent openclaw)
      MSG2AGENT_ALLOWED_DIDS:    "did:wba:msg2agent.home.gianlucamazza.it:agent:openclaw,did:wba:msg2agent.home.gianlucamazza.it:agent:gianluca-local,did:wba:msg2agent.home.gianlucamazza.it:agent:claude-desktop"
      # DID proof verification abilitata (default, non serve flag esplicita)
      # CORS: nessuna origine esterna (default sicuro)
      MSG2AGENT_CORS_ORIGINS:    ""
    volumes:
      - relay-data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - msg2agent
      - services_services   # Raggiungibile da NPM
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── OpenClaw MCP Agent ─────────────────────────────────────────────────────
  openclaw-agent:
    image: msg2agent-mcp-server:latest
    container_name: msg2agent-openclaw
    profiles: ["disabled"]   # disattivato
    ports:
      - "127.0.0.1:3010:3001"   # Loopback only — solo OpenClaw plugin
    command: [
      "-name",      "openclaw",
      "-domain",    "msg2agent.home.gianlucamazza.it",
      "-relay",     "ws://relay:8080",
      "-transport", "streamable-http",
      "-addr",      ":3001",
    ]
    volumes:
      - openclaw-data:/home/msg2agent/.msg2agent
    depends_on:
      relay:
        condition: service_healthy
    networks:
      - msg2agent
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  relay-data:
    # Persistenza SQLite del relay (registry agents + message queue)
  openclaw-data:
    # Chiavi crittografiche e stato dell'agent openclaw

networks:
  msg2agent:
    driver: bridge
  services_services:
    external: true   # Rete condivisa con NPM per proxy pubblico
