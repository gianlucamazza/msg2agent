---
kind: pipeline
type: docker
name: pull-request
platform:
  os: linux
  arch: arm64
clone:
  depth: 1
steps:
  - name: test
    image: golang:1.24-alpine
    environment:
      CGO_ENABLED: "0"
    volumes:
      - name: gomodcache
        path: /root/go/pkg/mod
    commands:
      - apk add --no-cache git
      - go mod download
      - go test ./pkg/... ./cmd/...
volumes:
  - name: gomodcache
    host:
      path: /var/cache/drone/gomod
trigger:
  event:
    - pull_request

---
kind: pipeline
type: docker
name: main
platform:
  os: linux
  arch: arm64
clone:
  depth: 1
steps:
  - name: test
    image: golang:1.24-alpine
    environment:
      CGO_ENABLED: "0"
    volumes:
      - name: gomodcache
        path: /root/go/pkg/mod
    commands:
      - apk add --no-cache git
      - go mod download
      - go test ./pkg/... ./cmd/...

  - name: docker-build-push-relay
    image: plugins/docker
    settings:
      daemon_off: true
      registry: registry.home.gianlucamazza.it
      repo: registry.home.gianlucamazza.it/gmazza/msg2agent-relay
      dockerfile: Dockerfile
      target: relay
      tags:
        - latest
        - ${DRONE_COMMIT_SHA}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: docker-build-push-agent
    image: plugins/docker
    settings:
      daemon_off: true
      registry: registry.home.gianlucamazza.it
      repo: registry.home.gianlucamazza.it/gmazza/msg2agent-agent
      dockerfile: Dockerfile
      target: agent
      tags:
        - latest
        - ${DRONE_COMMIT_SHA}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: docker-build-push-mcp
    image: plugins/docker
    settings:
      daemon_off: true
      registry: registry.home.gianlucamazza.it
      repo: registry.home.gianlucamazza.it/gmazza/msg2agent-mcp-server
      dockerfile: Dockerfile
      target: mcp-server
      tags:
        - latest
        - ${DRONE_COMMIT_SHA}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: deploy
    image: docker:cli
    environment:
      REGISTRY_USERNAME:
        from_secret: REGISTRY_USERNAME
      REGISTRY_PASSWORD:
        from_secret: REGISTRY_PASSWORD
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
      - name: opt_services
        path: /opt/services
    commands:
      - apk add --no-cache bash
      - echo "$REGISTRY_PASSWORD" | docker login registry.home.gianlucamazza.it -u "$REGISTRY_USERNAME" --password-stdin
      - docker pull registry.home.gianlucamazza.it/gmazza/msg2agent-relay:latest
      - docker pull registry.home.gianlucamazza.it/gmazza/msg2agent-agent:latest
      - docker pull registry.home.gianlucamazza.it/gmazza/msg2agent-mcp-server:latest
      - docker compose -f /opt/services/msg2agent/docker-compose.yml up -d --no-build

volumes:
  - name: gomodcache
    host:
      path: /var/cache/drone/gomod
  - name: docker_sock
    host:
      path: /var/run/docker.sock
  - name: opt_services
    host:
      path: /opt/services
trigger:
  branch:
    - main
  event:
    - push

---
kind: pipeline
type: docker
name: manual
platform:
  os: linux
  arch: arm64
clone:
  depth: 1
steps:
  - name: lint
    image: golangci/golangci-lint:v2.11-alpine
    volumes:
      - name: gomodcache
        path: /root/go/pkg/mod
    commands:
      - golangci-lint run --timeout=15m ./...

  - name: test
    image: golang:1.24-alpine
    environment:
      CGO_ENABLED: "0"
    volumes:
      - name: gomodcache
        path: /root/go/pkg/mod
    commands:
      - apk add --no-cache git
      - go mod download
      - go test ./pkg/... ./cmd/...

volumes:
  - name: gomodcache
    host:
      path: /var/cache/drone/gomod
trigger:
  event:
    - custom
