#cloud-config

write_files:

# --- Fetch secrets from Secret Manager and write /run/msg2agent/env ---
- path: /etc/systemd/system/fetch-secrets.service
  permissions: 0644
  owner: root
  content: |
    [Unit]
    Description=Fetch msg2agent secrets from Secret Manager
    Before=relay.service mcp-server.service dashboard.service
    After=network-online.target

    [Service]
    Type=oneshot
    RemainAfterExit=yes
    StandardOutput=journal
    ExecStartPre=/bin/mkdir -p /run/msg2agent
    ExecStart=/bin/bash -c '\
      set -e; \
      PROJECT="${project_id}"; \
      fetch() { gcloud secrets versions access latest --secret="$$1" --project="$$PROJECT" 2>/dev/null || echo ""; }; \
      { \
        echo "STRIPE_SECRET_KEY=$$(fetch stripe-secret-key)"; \
        echo "STRIPE_WEBHOOK_SECRET=$$(fetch stripe-webhook-secret)"; \
        echo "STRIPE_PRICE_FREE=$$(fetch stripe-price-free)"; \
        echo "STRIPE_PRICE_STARTER=$$(fetch stripe-price-starter)"; \
        echo "STRIPE_PRICE_TEAM=$$(fetch stripe-price-team)"; \
        echo "STRIPE_PRICE_ENTERPRISE=$$(fetch stripe-price-enterprise)"; \
        echo "MSG2AGENT_SERVICE_TOKEN=$$(fetch msg2agent-service-token)"; \
      } > /run/msg2agent/env; \
      chmod 600 /run/msg2agent/env'

    [Install]
    WantedBy=multi-user.target

# --- Format persistent data disk (idempotent) ---
- path: /etc/systemd/system/format-disk.service
  permissions: 0644
  owner: root
  content: |
    [Unit]
    Description=Format msg2agent data disk if needed
    Before=mount-disk.service docker.service

    [Service]
    Type=oneshot
    RemainAfterExit=yes
    StandardOutput=journal
    ExecStart=/bin/bash -c 'if ! blkid /dev/disk/by-id/google-msg2agent-data 2>/dev/null; then mkfs.ext4 -m 0 -F -E lazy_itable_init=0,lazy_journal_init=0,discard /dev/disk/by-id/google-msg2agent-data; fi'

    [Install]
    WantedBy=multi-user.target

# --- Mount persistent data disk ---
- path: /etc/systemd/system/mount-disk.service
  permissions: 0644
  owner: root
  content: |
    [Unit]
    Description=Mount msg2agent data disk
    Requires=format-disk.service
    After=format-disk.service
    Before=relay.service mcp-server.service dashboard.service

    [Service]
    Type=oneshot
    RemainAfterExit=yes
    StandardOutput=journal
    ExecStart=/bin/mkdir -p /var/lib/msg2agent
    ExecStart=/bin/mount -o discard,defaults /dev/disk/by-id/google-msg2agent-data /var/lib/msg2agent
    ExecStart=/bin/chmod 755 /var/lib/msg2agent

    [Install]
    WantedBy=multi-user.target

# --- relay ---
- path: /etc/systemd/system/relay.service
  permissions: 0644
  owner: root
  content: |
    [Unit]
    Description=msg2agent Relay Hub
    After=network-online.target docker.service mount-disk.service fetch-secrets.service
    Requires=docker.service mount-disk.service fetch-secrets.service

    [Service]
    TimeoutStartSec=0
    Restart=always
    StandardOutput=journal
    # Writable HOME required by docker-credential-gcr
    Environment="HOME=/var/lib/msg2agent/home"
    EnvironmentFile=/run/msg2agent/env
    ExecStartPre=/bin/mkdir -p /var/lib/msg2agent/home/.docker
    ExecStartPre=-/usr/bin/docker rm -f relay
    ExecStartPre=/usr/bin/docker-credential-gcr configure-docker --registries=${region}-docker.pkg.dev
    ExecStartPre=/usr/bin/docker pull ${relay_image}
    ExecStart=/usr/bin/docker run --rm --name relay \
      --network host \
      -v /var/lib/msg2agent:/data \
      -e MSG2AGENT_RELAY_ADDR=:8080 \
      -e MSG2AGENT_STORE=sqlite \
      -e MSG2AGENT_STORE_FILE=/data/relay.db \
      -e MSG2AGENT_BILLING_DB=/data/billing.db \
      -e MSG2AGENT_BILLING_DRIVER=sqlite \
      -e MSG2AGENT_LOG_LEVEL=info \
      -e MSG2AGENT_MAX_CONNECTIONS=10000 \
      -e MSG2AGENT_REQUIRE_DID_PROOF=true \
      -e MSG2AGENT_ENABLE_SIGNUP=true \
      -e STRIPE_SECRET_KEY=$${STRIPE_SECRET_KEY} \
      -e STRIPE_WEBHOOK_SECRET=$${STRIPE_WEBHOOK_SECRET} \
      -e STRIPE_PRICE_FREE=$${STRIPE_PRICE_FREE} \
      -e STRIPE_PRICE_STARTER=$${STRIPE_PRICE_STARTER} \
      -e STRIPE_PRICE_TEAM=$${STRIPE_PRICE_TEAM} \
      -e STRIPE_PRICE_ENTERPRISE=$${STRIPE_PRICE_ENTERPRISE} \
      -e MSG2AGENT_SERVICE_TOKEN=$${MSG2AGENT_SERVICE_TOKEN} \
      ${relay_image}
    ExecStop=/usr/bin/docker stop relay

    [Install]
    WantedBy=multi-user.target

# --- mcp-server ---
- path: /etc/systemd/system/mcp-server.service
  permissions: 0644
  owner: root
  content: |
    [Unit]
    Description=msg2agent MCP Server
    After=relay.service fetch-secrets.service
    Requires=relay.service fetch-secrets.service

    [Service]
    TimeoutStartSec=0
    Restart=always
    StandardOutput=journal
    Environment="HOME=/var/lib/msg2agent/home"
    EnvironmentFile=/run/msg2agent/env
    ExecStartPre=/bin/mkdir -p /var/lib/msg2agent/home/.docker
    ExecStartPre=-/usr/bin/docker rm -f mcp-server
    ExecStartPre=/usr/bin/docker-credential-gcr configure-docker --registries=${region}-docker.pkg.dev
    ExecStartPre=/usr/bin/docker pull ${mcp_image}
    ExecStart=/usr/bin/docker run --rm --name mcp-server \
      --network host \
      -v /var/lib/msg2agent:/data \
      -e MSG2AGENT_RELAY_URL=ws://localhost:8080 \
      -e MSG2AGENT_NAME=cloud-gateway \
      -e MSG2AGENT_DOMAIN=${domain_name} \
      -e MSG2AGENT_BILLING_DB=/data/billing.db \
      -e MSG2AGENT_BILLING_DRIVER=sqlite \
      -e MSG2AGENT_SERVICE_TOKEN=$${MSG2AGENT_SERVICE_TOKEN} \
      -e MSG2AGENT_HTTP_ADDR=:3001 \
      ${mcp_image} -transport streamable-http -addr :3001
    ExecStop=/usr/bin/docker stop mcp-server

    [Install]
    WantedBy=multi-user.target

# --- dashboard ---
- path: /etc/systemd/system/dashboard.service
  permissions: 0644
  owner: root
  content: |
    [Unit]
    Description=msg2agent Dashboard
    After=relay.service fetch-secrets.service
    Requires=relay.service fetch-secrets.service

    [Service]
    TimeoutStartSec=0
    Restart=always
    StandardOutput=journal
    Environment="HOME=/var/lib/msg2agent/home"
    EnvironmentFile=/run/msg2agent/env
    ExecStartPre=/bin/mkdir -p /var/lib/msg2agent/home/.docker
    ExecStartPre=-/usr/bin/docker rm -f dashboard
    ExecStartPre=/usr/bin/docker-credential-gcr configure-docker --registries=${region}-docker.pkg.dev
    ExecStartPre=/usr/bin/docker pull ${dashboard_image}
    ExecStart=/usr/bin/docker run --rm --name dashboard \
      --network host \
      -v /var/lib/msg2agent:/data \
      -e MSG2AGENT_DASHBOARD_ADDR=:8082 \
      -e MSG2AGENT_RELAY_URL=http://localhost:8080 \
      -e MSG2AGENT_BILLING_DB=/data/billing.db \
      -e MSG2AGENT_BILLING_DRIVER=sqlite \
      -e MSG2AGENT_OAUTH_AUTO_PROVISION=free \
      -e MSG2AGENT_SERVICE_TOKEN=$${MSG2AGENT_SERVICE_TOKEN} \
      ${dashboard_image}
    ExecStop=/usr/bin/docker stop dashboard

    [Install]
    WantedBy=multi-user.target

runcmd:
- systemctl daemon-reload
- systemctl enable --now format-disk.service
- systemctl enable --now mount-disk.service
- systemctl enable --now fetch-secrets.service
- systemctl enable --now relay.service
- systemctl enable --now mcp-server.service
- systemctl enable --now dashboard.service
