# msg2agent Docker Compose - Base Configuration
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f            # Follow logs
#   docker compose down               # Stop and remove
#
# Overrides:
#   docker compose -f docker-compose.yml -f docker-compose.sqlite.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

services:
  # Relay Hub - Central message router
  relay:
    image: msg2agent-relay:latest
    build:
      context: .
      target: relay
    ports:
      - "${RELAY_PORT:-8080}:8080"
    environment:
      MSG2AGENT_RELAY_ADDR: ":8080"
      MSG2AGENT_STORE: "memory"
      MSG2AGENT_LOG_LEVEL: "${LOG_LEVEL:-debug}"
      MSG2AGENT_MAX_CONNECTIONS: "${MAX_CONNECTIONS:-1000}"
      MSG2AGENT_MSG_RATE: "${MSG_RATE:-100}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - msg2agent
    restart: unless-stopped

  # MCP Server - Model Context Protocol interface for AI assistants
  mcp-server:
    image: msg2agent-mcp-server:latest
    build:
      context: .
      target: mcp-server
    command:
      [
        "-name",
        "mcp-agent",
        "-domain",
        "mcp.local",
        "-relay",
        "ws://relay:8080",
        "-transport",
        "streamable-http",
        "-addr",
        ":3001",
      ]
    ports:
      - "${MCP_PORT:-3001}:3001"
    volumes:
      - mcp-identity:/home/msg2agent/.msg2agent
    depends_on:
      relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - msg2agent
    restart: unless-stopped

  # Dashboard - tenant/API-key/usage UI. The API returns 503 until billing and OAuth are configured.
  dashboard:
    image: msg2agent-dashboard:latest
    build:
      context: .
      target: dashboard
    ports:
      - "${DASHBOARD_PORT:-8082}:8082"
    environment:
      MSG2AGENT_DASHBOARD_ADDR: ":8082"
      MSG2AGENT_RELAY_URL: "http://relay:8080"
    depends_on:
      relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - msg2agent
    restart: unless-stopped

volumes:
  mcp-identity:

networks:
  msg2agent:
    driver: bridge
