---
kind: pipeline
type: docker
name: pull-request
platform:
  os: linux
  arch: arm64
clone:
  depth: 1
steps:
  - name: web-check
    image: node:22-alpine
    volumes:
      - name: pnpmstore
        path: /root/.local/share/pnpm/store
    commands:
      - apk add --no-cache git
      - corepack enable
      - make web-check

  - name: web-test
    image: mcr.microsoft.com/playwright:v1.49-jammy
    volumes:
      - name: pnpmstore
        path: /root/.local/share/pnpm/store
    commands:
      - corepack enable
      - CI=true make web-test

  - name: lint
    image: golangci/golangci-lint:v2.11.0-alpine
    volumes:
      - name: gomodcache
        path: /root/go/pkg/mod
    commands:
      - golangci-lint run --timeout=15m ./...

  - name: test
    image: golang:1.25-alpine
    environment:
      CGO_ENABLED: "1"
    volumes:
      - name: gomodcache
        path: /root/go/pkg/mod
    commands:
      - apk add --no-cache git gcc musl-dev
      - go mod download
      - make test-unit

volumes:
  - name: gomodcache
    host:
      path: /var/cache/drone/gomod
  - name: pnpmstore
    host:
      path: /var/cache/drone/pnpmstore
trigger:
  event:
    - pull_request

---
kind: pipeline
type: docker
name: main
platform:
  os: linux
  arch: arm64
clone:
  depth: 1
steps:
  - name: web-check
    image: node:22-alpine
    volumes:
      - name: pnpmstore
        path: /root/.local/share/pnpm/store
    commands:
      - apk add --no-cache git
      - corepack enable
      - make web-check

  - name: web-test
    image: mcr.microsoft.com/playwright:v1.49-jammy
    volumes:
      - name: pnpmstore
        path: /root/.local/share/pnpm/store
    commands:
      - corepack enable
      - CI=true make web-test

  - name: lint
    image: golangci/golangci-lint:v2.11.0-alpine
    volumes:
      - name: gomodcache
        path: /root/go/pkg/mod
    commands:
      - golangci-lint run --timeout=15m ./...

  - name: test
    image: golang:1.25-alpine
    environment:
      CGO_ENABLED: "1"
    volumes:
      - name: gomodcache
        path: /root/go/pkg/mod
    commands:
      - apk add --no-cache git gcc musl-dev
      - go mod download
      - make test-unit

  - name: docker-build-push-relay
    image: plugins/docker
    settings:
      daemon_off: true
      registry: registry.home.gianlucamazza.it
      repo: registry.home.gianlucamazza.it/gmazza/msg2agent-relay
      dockerfile: Dockerfile
      target: relay
      tags:
        - latest
        - ${DRONE_COMMIT_SHA}
      build_args:
        - VERSION=${DRONE_TAG=${DRONE_COMMIT_BRANCH}-${DRONE_BUILD_NUMBER}}
        - COMMIT=${DRONE_COMMIT_SHA}
        - DATE=${DRONE_BUILD_CREATED}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: docker-build-push-mcp
    image: plugins/docker
    settings:
      daemon_off: true
      registry: registry.home.gianlucamazza.it
      repo: registry.home.gianlucamazza.it/gmazza/msg2agent-mcp-server
      dockerfile: Dockerfile
      target: mcp-server
      tags:
        - latest
        - ${DRONE_COMMIT_SHA}
      build_args:
        - VERSION=${DRONE_TAG=${DRONE_COMMIT_BRANCH}-${DRONE_BUILD_NUMBER}}
        - COMMIT=${DRONE_COMMIT_SHA}
        - DATE=${DRONE_BUILD_CREATED}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: docker-build-push-billing-admin
    image: plugins/docker
    settings:
      daemon_off: true
      registry: registry.home.gianlucamazza.it
      repo: registry.home.gianlucamazza.it/gmazza/msg2agent-billing-admin
      dockerfile: Dockerfile
      target: billing-admin
      tags:
        - latest
        - ${DRONE_COMMIT_SHA}
      build_args:
        - VERSION=${DRONE_TAG=${DRONE_COMMIT_BRANCH}-${DRONE_BUILD_NUMBER}}
        - COMMIT=${DRONE_COMMIT_SHA}
        - DATE=${DRONE_BUILD_CREATED}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: docker-build-push-dashboard
    image: plugins/docker
    settings:
      daemon_off: true
      registry: registry.home.gianlucamazza.it
      repo: registry.home.gianlucamazza.it/gmazza/msg2agent-dashboard
      dockerfile: Dockerfile
      target: dashboard
      tags:
        - latest
        - ${DRONE_COMMIT_SHA}
      build_args:
        - VERSION=${DRONE_TAG=${DRONE_COMMIT_BRANCH}-${DRONE_BUILD_NUMBER}}
        - COMMIT=${DRONE_COMMIT_SHA}
        - DATE=${DRONE_BUILD_CREATED}
      username:
        from_secret: REGISTRY_USERNAME
      password:
        from_secret: REGISTRY_PASSWORD
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

  - name: deploy
    image: docker:cli
    environment:
      REGISTRY_USERNAME:
        from_secret: REGISTRY_USERNAME
      REGISTRY_PASSWORD:
        from_secret: REGISTRY_PASSWORD
    volumes:
      - name: docker_sock
        path: /var/run/docker.sock
      - name: opt_services
        path: /opt/services
    commands:
      - echo "$REGISTRY_PASSWORD" | docker login registry.home.gianlucamazza.it -u "$REGISTRY_USERNAME" --password-stdin
      - docker pull registry.home.gianlucamazza.it/gmazza/msg2agent-relay:${DRONE_COMMIT_SHA}
      - docker pull registry.home.gianlucamazza.it/gmazza/msg2agent-mcp-server:${DRONE_COMMIT_SHA}
      - docker pull registry.home.gianlucamazza.it/gmazza/msg2agent-billing-admin:${DRONE_COMMIT_SHA}
      - docker pull registry.home.gianlucamazza.it/gmazza/msg2agent-dashboard:${DRONE_COMMIT_SHA}
      - cp /drone/src/infrastructure/docker-compose.odroid.yml /opt/services/msg2agent/docker-compose.yml
      - cp /drone/src/infrastructure/agentcard-msg2agent.json /opt/services/msg2agent/agentcard.json
      - cp /drone/src/infrastructure/connector-manifest.json /opt/services/msg2agent/connector-manifest.json
      - echo "MSG2AGENT_VERSION=${DRONE_COMMIT_SHA}" > /opt/services/msg2agent/.env.version
      - docker compose --env-file /opt/services/msg2agent/.env.version --env-file /opt/services/msg2agent/.env -f /opt/services/msg2agent/docker-compose.yml up -d --no-build --force-recreate

volumes:
  - name: gomodcache
    host:
      path: /var/cache/drone/gomod
  - name: pnpmstore
    host:
      path: /var/cache/drone/pnpmstore
  - name: docker_sock
    host:
      path: /var/run/docker.sock
  - name: opt_services
    host:
      path: /opt/services
trigger:
  branch:
    - main
  event:
    - push

