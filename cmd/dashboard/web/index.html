<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>msg2agent Dashboard</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <nav>
    <a href="/" class="logo">msg2agent</a>
    <span id="nav-plan"></span>
    <button id="btn-signout" hidden>Sign Out</button>
  </nav>

  <div id="auth-gate" hidden>
    <div class="auth-gate-container">
      <h2 class="auth-gate-title">Sign in</h2>
      <p class="auth-gate-subtitle">
        Authenticate with Google to access your msg2agent dashboard.
      </p>
      <button id="btn-signin" class="btn-primary">Sign in with Google</button>
      <p id="auth-error" hidden class="error-text"></p>
    </div>
  </div>

  <main id="main-content">
    <section id="section-account">
      <h2>Account</h2>
      <div id="account-info">
        <div class="skeleton skeleton-sm-narrow"></div>
        <div class="skeleton skeleton-sm-wide"></div>
      </div>
    </section>
    <section id="section-keys">
      <h2>API Keys</h2>
      <button id="btn-create-key">Create Key</button>
      <div id="keys-list">
        <div class="skeleton skeleton-row"></div>
      </div>
    </section>
    <section id="section-usage">
      <h2>Usage</h2>
      <div id="usage-chart">
        <div class="skeleton skeleton-row-gap"></div>
        <div class="skeleton skeleton-row"></div>
      </div>
    </section>
    <section id="section-billing">
      <h2>Billing</h2>
      <button id="btn-upgrade-starter">Upgrade to Starter</button>
      <button id="btn-upgrade-team">Upgrade to Team</button>
      <button id="btn-portal">Manage Subscription</button>
    </section>
  </main>
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <dialog id="modal" aria-modal="true">
    <form method="dialog" id="modal-form">
      <p id="modal-title" class="modal-title"></p>
      <input id="modal-input" type="text" class="modal-input" autocomplete="off">
      <p id="modal-message" class="modal-message"></p>
      <div class="modal-actions">
        <button type="submit" id="modal-confirm" class="btn-primary">OK</button>
        <button type="button" id="modal-cancel">Cancel</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
